name: Update Vercel Alias

on:
  push:
    branches: [main]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Point xueba-notes.vercel.app at the latest production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_ZeqPCPRnvA2E04bVjlrLQ9lP
          VERCEL_PROJECT_ID: prj_hu8apFaIbcPmFcNBHqIFfLAoFC24
          VERCEL_ALIAS: xueba-notes.vercel.app
          GITHUB_SHA: ${{ github.sha }}
        run: node .github/scripts/vercel-alias.mjs
